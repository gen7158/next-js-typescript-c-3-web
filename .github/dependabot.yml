version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Tokyo"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps(c)"
    labels:
      - "dependencies"
    # メジャー更新は既存プロジェクトの互換性問題を起こしやすいため
    # マイナー/パッチに限定して自動PRを出す
    ignore:
      - dependency-type: "development"
        update-types: ["version-update:semver-major"]
      - dependency-type: "production"
        update-types: ["version-update:semver-major"]
    groups:
      production:
        dependency-type: "production"
      development:
        dependency-type: "development"
  - package-ecosystem: "npm"
    directory: "/ts-pass-lab"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Tokyo"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps(ts)"
    labels:
      - "dependencies"
    # TypeScript版も同様: メジャー更新は除外してマイナー/パッチのみ
    ignore:
      - dependency-type: "development"
        update-types: ["version-update:semver-major"]
      - dependency-type: "production"
        update-types: ["version-update:semver-major"]
    groups:
      production:
        dependency-type: "production"
      development:
        dependency-type: "development"
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Tokyo"
    commit-message:
      prefix: "ci"
    labels:
      - "ci"
