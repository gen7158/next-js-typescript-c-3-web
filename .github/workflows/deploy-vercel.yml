name: Deploy to Vercel (manual)

# 通常の運用では Vercel Dashboard での GitHub 連携を推奨。
# このワークフローは GitHub Actions からの手動デプロイ代替手段。
# https://vercel.com/dashboard → プロジェクト → Settings → Git → Connect

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Vercel deploy target'
        required: true
        type: choice
        default: 'production'
        options:
          - production
          - preview

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  c-lab:
    name: Deploy C言語版 (next-js-typescript-c-3-web)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    environment:
      name: ${{ inputs.target || 'production' }}
    steps:
      - uses: actions/checkout@v7
      - name: Install Vercel CLI
        run: npm install -g vercel@latest
      - name: Configure .vercel/project.json
        working-directory: ./
        run: |
          mkdir -p .vercel
          printf '{"projectId":"prj_AYeTag5S9OU5oLPeavnm3GX0KpYH","orgId":"team_TGWG4KMuj86ADOJ3NlPUaJN7","projectName":"next-js-typescript-c-3-web"}\n' > .vercel/project.json
      - name: Pull Vercel project info
        working-directory: ./
        run: vercel pull --yes --token "${{ secrets.VERCEL_TOKEN }}" --scope rikishin1101-6295s-projects || true
      - name: Deploy to Vercel
        working-directory: ./
        run: |
          if [[ "${{ inputs.target }}" == "production" ]]; then
            vercel deploy --prod --yes --token "${{ secrets.VERCEL_TOKEN }}" --scope rikishin1101-6295s-projects
          else
            vercel deploy --yes --token "${{ secrets.VERCEL_TOKEN }}" --scope rikishin1101-6295s-projects
          fi

  ts-lab:
    name: Deploy TypeScript版 (ts-pass-lab-v2)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    environment:
      name: ${{ inputs.target || 'production' }}
    steps:
      - uses: actions/checkout@v7
      - name: Install Vercel CLI
        run: npm install -g vercel@latest
      - name: Configure .vercel/project.json
        # Vercel側のRoot Directoryがts-pass-labなので、リンク情報はリポジトリ直下に置く
        run: |
          mkdir -p .vercel
          printf '{"projectId":"prj_noYfpHgVtCNjFMGDsOjIw3llZ9JV","orgId":"team_TGWG4KMuj86ADOJ3NlPUaJN7","projectName":"ts-pass-lab-v2"}\n' > .vercel/project.json
      - name: Pull Vercel project info
        run: vercel pull --yes --token "${{ secrets.VERCEL_TOKEN }}" --scope rikishin1101-6295s-projects || true
      - name: Deploy to Vercel
        run: |
          if [[ "${{ inputs.target }}" == "production" ]]; then
            vercel deploy --prod --yes --token "${{ secrets.VERCEL_TOKEN }}" --scope rikishin1101-6295s-projects --build-env GEMINI_API_KEY="${{ secrets.GEMINI_API_KEY }}"
          else
            vercel deploy --yes --token "${{ secrets.VERCEL_TOKEN }}" --scope rikishin1101-6295s-projects --build-env GEMINI_API_KEY="${{ secrets.GEMINI_API_KEY }}"
          fi
