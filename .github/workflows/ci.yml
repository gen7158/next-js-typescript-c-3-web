name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  c-lab:
    name: C言語版 (root)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./
    steps:
      - uses: actions/checkout@v6
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: '1'

  ts-lab:
    name: TypeScript版 (ts-pass-lab)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./ts-pass-lab
    steps:
      - uses: actions/checkout@v6
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: ts-pass-lab/package-lock.json
      - name: Install dependencies
        working-directory: ./ts-pass-lab
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: '1'
